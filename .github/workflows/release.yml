name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dist/sl_say.exe
            asset_name: sl_say-windows.exe
          - os: macos-latest
            artifact: dist/sl_say.app
            asset_name: sl_say-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build
        run: uv run pyinstaller sl_say.spec

      - name: Zip macOS app bundle
        if: runner.os == 'macOS'
        run: cd dist && zip -r sl_say-macos.zip sl_say.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ runner.os == 'macOS' && 'dist/sl_say-macos.zip' || matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/sl_say-windows.exe/sl_say.exe
            artifacts/sl_say-macos.zip/sl_say-macos.zip
          generate_release_notes: true
